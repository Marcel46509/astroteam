<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Asteroid X — Peak Performance</title>

    <link rel="icon" type="image/x-icon" href="public/favicon.ico">

    <link rel="stylesheet" href="source/css/styles.css">
    <link rel="stylesheet" href="source/css/short.css">
</head>
<body>

<script type="module" src="compiled/app.js"></script>

<main>
    <div id="stars" class="stars"></div>

    <div class="page">
        <div class="page-text">
            <h1>Asteroid X</h1>
            <h2>The fastest, most reliable executor. Simple. Powerful. Free.</h2>

            <div class="page-links">
                <a href="redirect.html?to=download">Download</a>
                <a href="redirect.html?to=discord">Join Community</a>
            </div>
        </div>

        <div class="page-text page-right">
            <div class="card-div dg">
                <img class="card" src="public/images/app.png" draggable="false">
            </div>
        </div>

        <svg class="wave" viewBox="0 0 1440 280">
            <path fill-opacity="1"
                d="M0,192L60,202.7C120,213,240,235,360,234.7C480,235,600,213,720,192C840,171,960,149,1080,
                149.3C1200,149,1320,171,1380,181.3L1440,192L1440,320L0,320Z">
            </path>
        </svg>
    </div>
</main>

<footer id="footer"></footer>

<script>
    // Stars

    const starsContainer = document.getElementById("stars");

    for (let i = 0; i < 100; i++) {
        const star = document.createElement("div");

        star.className = "star";
        star.style.width = Math.random() * 3 + "px";
        star.style.height = star.style.width;
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.animationDelay = Math.random() * 3 + "s";

        starsContainer.appendChild(star);
    }

    // 3D effect on cards

    const cards = document.querySelectorAll('.card-div');

    cards.forEach(card => {
        let bounds;

        const div = card.firstElementChild;

        function updateBounds() {
            bounds = div.getBoundingClientRect();
        }

        card.addEventListener('mouseenter', () => {
            updateBounds();
        });

        card.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            const leftX = mouseX - bounds.left;
            const topY = mouseY - bounds.top;
            const centerX = leftX - bounds.width / 2;
            const centerY = topY - bounds.height / 2;
            const rotateX = (centerY / (bounds.height / 2)) * 10;
            const rotateY = (centerX / (bounds.width / 2)) * -10;

            div.style.transform = `perspective(1000px) rotateX(${-rotateX}deg) rotateY(${-rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
        });

        card.addEventListener('mouseleave', () => {
            div.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
        });

        // Update bounds on window resize
        window.addEventListener('resize', () => {
            if (bounds) updateBounds();
        });
    });
</script>

</body>
</html>
